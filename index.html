<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// --- 原有資料結構與變數保持不變 ---
var D={stk:[],banks:[],expenses:[],incomes:[],nExp:1,nInc:1,sync:!1,url:'',last:null,fx:{USD:31.5,JPY:0.21,COP:0.008,EUR:34.5}};
var curPg=0,wkOff=0,stkIdx=null,bkIdx=null,expIdx=null,incIdx=null;
var autoUpdateTimer = null; // 新增：自動更新計時器

// 1. 新增：判斷台灣股市是否開盤 (週一至週五 09:00 - 13:35)
function isTWMarketOpen() {
  const now = new Date();
  const twTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Taipei"}));
  const day = twTime.getDay(); 
  const hour = twTime.getHours();
  const min = twTime.getMinutes();
  const timeVal = hour * 100 + min;
  return (day >= 1 && day <= 5) && (timeVal >= 900 && timeVal <= 1335);
}

// 2. 新增：管理自動更新邏輯
function manageAutoUpdate() {
  const isOpen = isTWMarketOpen();
  const badge = document.getElementById('mktBadge');
  
  if (isOpen) {
    if (badge) {
      badge.style.display = 'inline-block';
      badge.style.background = 'rgba(16,185,129,0.1)';
      badge.style.color = 'var(--gn)';
      badge.innerText = '● 即時更新中 (10s)';
    }
    // 如果計時器沒啟動，則啟動它
    if (!autoUpdateTimer) {
      autoUpdateTimer = setInterval(() => {
        if (isTWMarketOpen()) {
          console.log("台股交易中，執行 10s 自動更新...");
          updStk(); 
        } else {
          manageAutoUpdate(); // 轉為收盤狀態
        }
      }, 10000);
    }
  } else {
    if (badge) {
      badge.style.display = 'inline-block';
      badge.style.background = 'var(--n2)';
      badge.style.color = 'var(--t3)';
      badge.innerText = '○ 非交易時段';
    }
    if (autoUpdateTimer) {
      clearInterval(autoUpdateTimer);
      autoUpdateTimer = null;
    }
  }
}

// 3. 修改：原有的 updStk 函數，加入防快取機制
async function updStk(){
  if(!D.stk.length)return;
  var ri=document.getElementById('ri');
  if(ri)ri.classList.add('spn');
  
  // 加入時間戳記避免 API 快取
  const ts = new Date().getTime();
  try{
    var res=await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL?t='+ts);
    var data=await res.json();
    D.stk.forEach(function(s){
      var f=data.find(function(x){return x.Code===s.code});
      if(f){
        s.price=parseFloat(f.ClosingPrice);
        s.pd=new Date().toISOString();
      }
    });
    D.last=new Date().toISOString();
    save();rDash();rStk();rCharts();
  }catch(e){console.error("更新股價失敗",e)}
  if(ri)ri.classList.remove('spn');
}

// --- 以下為原本的其他函數，確保結構完整不破壞 ---

function init(){
  var s=localStorage.getItem('fin_data');
  if(s){
    var d=JSON.parse(s);
    if(d.stk)D.stk=d.stk;
    if(d.banks)D.banks=d.banks;
    if(d.expenses)D.expenses=d.expenses;
    if(d.incomes)D.incomes=d.incomes;
    D.nExp=d.nExp||1;D.nInc=d.nInc||1;
    D.url=d.url||'';D.sync=!!d.sync;D.last=d.last;
  }
  // 初始化後檢查一次是否需要開啟自動更新
  manageAutoUpdate();
  // 即使沒開盤，進來時也手動更新一次最新價格（顯示最後收盤價）
  updStk();
  uGsSt();uLrt();go(0);
}

// 保持原本的 go, rDash, rStk 等函數... (此處省略以節省篇幅，請保留原檔內容)

// 修改 window.onload
window.onload=function(){
  init();
  // 每分鐘檢查一次是否進入開盤時間（針對網頁一直開著的情況）
  setInterval(manageAutoUpdate, 60000);
};

// ...其餘原有的 sbStk, cMo, save, pushGs 等函數請全部保留...
</script>
